<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
    <script>
      (() => {
        try {
          var raw = localStorage.getItem('theme');
          var theme = raw ? JSON.parse(raw) : 'light';
          var isDark = theme === 'dark';
          if (isDark) document.documentElement.classList.add('dark');
        } catch(_e) {}

        // Settings redesign — apply text-size preference before first paint
        // to avoid 13→14/15 flash. Reads localStorage directly; the
        // server-persisted value is reconciled in Phase 1's TextSizeSection.
        try {
          var ts = localStorage.getItem('product-builder:text-size');
          if (ts === 'md' || ts === 'lg') {
            document.documentElement.dataset.textSize = ts;
          }
        } catch(_e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
