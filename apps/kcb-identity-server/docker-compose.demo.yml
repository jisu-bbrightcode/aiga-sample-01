# Local demo stack for the KCB identity bridge.
#
# Brings up Postgres (for the Nest server DB) and the Java KCB bridge.
# The Nest server (apps/server) and the web app (apps/app) run via pnpm on the host.
#
# The official KCB module JAR + license are mounted read-only from ./artifacts
# (gitignored — never baked into the image). Copy yours there first:
#   apps/kcb-identity-server/artifacts/jar/OkCert3-java1.5-2.3.5.jar
#   apps/kcb-identity-server/artifacts/license/V72010000000_IDS_01_PROD_AES_license.dat
#
# Usage:
#   cd apps/kcb-identity-server
#   cp .env.demo.example .env            # then edit values
#   docker compose -f docker-compose.demo.yml up --build
#   curl localhost:18999/health

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - kcb_demo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  kcb-java:
    build:
      context: .
    ports:
      - "18999:8080"
    environment:
      KCB_MODE: ${KCB_MODE:-PROD}
      KCB_SITE_CODE: ${KCB_SITE_CODE}
      KCB_SITE_NAME: ${KCB_SITE_NAME}
      KCB_SITE_URL: ${KCB_SITE_URL}
      KCB_STANDARD_RETURN_URL: ${KCB_STANDARD_RETURN_URL}
      KCB_POPUP_URL: ${KCB_POPUP_URL:-https://safe.ok-name.co.kr/CommonSvl}
      KCB_INTERNAL_AUTH_TOKEN: ${KCB_INTERNAL_AUTH_TOKEN}
      KCB_OFFICIAL_SOURCE_MAP: ${KCB_OFFICIAL_SOURCE_MAP:-Korea Medicare KCB package}
      KCB_MODULE_JAR_PATH: /artifacts/jar/OkCert3-java1.5-2.3.5.jar
      KCB_LICENSE_PATH: /artifacts/license/V72010000000_IDS_01_PROD_AES_license.dat
    volumes:
      - ./artifacts:/artifacts:ro

volumes:
  kcb_demo_pgdata:
